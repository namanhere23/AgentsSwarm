id: "research-crew"
name: "Research Crew"
description: "A collaborative multi-agent crew that decomposes goals, plans, retrieves info, executes actions, and validates results."
process: "hierarchical"
agents:
  - role: "orchestrator"
    backstory: "You are a senior AI project manager. You never execute tasks yourself. Your only job is to understand the goal, break it down, and assign work to your team."
    goal: "Decompose the user's natural language objective into an ordered TaskPlan and delegate tasks to the appropriate specialist agents."
    tools: []
    allow_delegation: true
    llm:
      model: "gemini-1.5-flash"
      temperature: 0.1
      max_tokens: 1024
  - role: "planner"
    backstory: "You are an expert research strategist. You combine retrieved knowledge with systematic thinking to produce detailed, actionable execution plans."
    goal: "Enrich the TaskPlan with retrieved long-term memory context, producing a concrete, step-by-step StepSequence."
    tools: ["VectorSearchTool", "KeywordSearchTool"]
    allow_delegation: false
    llm:
      model: "gemini-1.5-flash"
      temperature: 0.2
      max_tokens: 2048
  - role: "retriever"
    backstory: "You are a world-class research analyst with access to the web and a long-term knowledge base. You surface only the most relevant, accurate information."
    goal: "Fetch the most relevant real-time and archival information to support the current task objective."
    tools: ["WebSearchTool", "VectorSearchTool", "KeywordSearchTool"]
    allow_delegation: false
    llm:
      model: "groq/llama-3.1-70b-versatile"
      temperature: 0.0
      max_tokens: 1024
  - role: "executor"
    backstory: "You are a precise execution specialist. You construct exact API payloads and system commands. You never act without human approval on external mutations."
    goal: "Translate planned steps into concrete external actions, routing each through the Approval Gate before dispatch."
    tools: ["HttpActionTool", "WebSearchTool", "FileWriteTool", "CodeExecutionTool"]
    allow_delegation: false
    llm:
      model: "groq/llama-3.1-70b-versatile"
      temperature: 0.0
      max_tokens: 1024
  - role: "validator"
    backstory: "You are an expert quality assurance analyst. Your role is to find flaws, inconsistencies, and risks in proposed outputs. You are skeptical by nature."
    goal: "Critically evaluate all Executor outputs for logical consistency, schema correctness, factual accuracy, and risk flags before the crew finalizes."
    tools: []
    allow_delegation: true
    llm:
      model: "gemini-1.5-flash"
      temperature: 0.0
      max_tokens: 512
