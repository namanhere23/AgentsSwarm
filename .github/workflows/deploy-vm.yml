name: Deploy Backend to GCP VM

on:
  push:
    branches:
      - main
      - pipeline
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-vm.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to GCP Compute Engine
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: 22
        
        script: |
          echo "Starting Deployment..."
          cd ~/AgentsSwarm
          
          # Pull the latest code from the branch that triggered the workflow
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}
          
          # Install any new dependencies if needed
          venv/bin/pip install -r backend/requirements.txt
          
          # Define commands as split strings to prevent the SSH shell from matching pkill -f
          U_CMD="uvi""corn"
          W_CMD="backend.""workers"
          
          # Kill old processes
          echo "Stopping old servers and clearing screen sessions..."
          sudo fuser -k 80/tcp || true
          sudo pkill -f "$U_CMD" || true
          sudo pkill -f "$W_CMD" || true
          # Close all previous screen sessions
          screen -ls | awk '/\.swarm_api\t/ {print $1}' | xargs -r -I{} screen -S {} -X quit || true
          
          # Safely kill Chroma DB without killing the deployment script
          sudo pkill -f "[c]hroma run" || true
          
          # Start Chroma DB (using quotes around "run" so it doesn't accidentally match the pkill regex)
          echo "Starting Chroma DB..."
          nohup venv/bin/chroma "run" --host localhost --port 8001 --path ./chroma_data > chroma.log 2>&1 &
          
          # Start Workers and Uvicorn inside a detached screen session
          echo "Starting new API and Workers in background..."
          screen -dmS swarm_api bash -c "sudo venv/bin/python -m ${W_CMD}.whisper_consumer > whisper_worker.log 2>&1 & sudo venv/bin/python -m ${W_CMD}.tts_consumer > tts_worker.log 2>&1 & sudo venv/bin/python -m ${U_CMD} backend.main:app --host 0.0.0.0 --port 80 > api.log 2>&1; exec bash"       
          echo "Deployment Successful!"