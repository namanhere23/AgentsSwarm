name: CI — Agent Swarms

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: nexsus
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: nexsus_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          python -m spacy download en_core_web_sm

      - name: Lint with ruff
        run: pip install ruff && ruff check backend/

      - name: Run backend tests
        env:
          ENVIRONMENT: test
          SECRET_KEY: test_secret_key
          FIREBASE_PROJECT_ID: test-project
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_KEY: test_key
          SUPABASE_JWT_SECRET: test_jwt_secret
          GEMINI_API_KEY: test_key
          SERPER_API_KEY: test_key
          REDIS_URL: redis://localhost:6379
          MOCK_TOOLS: "true"
        run: |
          pip install pytest pytest-asyncio
          pytest backend/tests/ -v --tb=short

  frontend-lint-test:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint with ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run Vitest unit tests
        working-directory: frontend
        run: npm test -- --run

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: test
          VITE_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: test-project
          VITE_FIREBASE_APP_ID: 1:000:web:000
        run: npm run build

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t agentswarms-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t agentswarms-frontend:ci ./frontend
